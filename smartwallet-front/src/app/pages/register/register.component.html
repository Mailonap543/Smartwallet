<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" autocomplete="off">
  <div>
    <label for="fullName">Nome Completo</label>
    <input id="fullName" type="text" formControlName="fullName" autocomplete="off" />
    <div *ngIf="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">
      Nome é obrigatório.
    </div>
  </div>

  <div>
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" autocomplete="new-password" />
    <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
      Email inválido.
    </div>
  </div>

  <div>
    <label for="password">Senha</label>
    <input id="password" type="password" formControlName="password" autocomplete="new-password" />
    <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
      Senha é obrigatória.
    </div>
  </div>

  <div>
    <label for="cpf">CPF</label>
    <input id="cpf" type="text" formControlName="cpf" autocomplete="off" maxlength="14" placeholder="000.000.000-00" />
    <div *ngIf="registerForm.get('cpf')?.invalid && registerForm.get('cpf')?.touched">
      CPF é obrigatório.
    </div>
  </div>

  <div>
    <label for="phone">Telefone</label>
    <input id="phone" type="text" formControlName="phone" autocomplete="one-time-code" />
    <div *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
      Telefone é obrigatório.
    </div>
  </div>

  <button type="submit" [disabled]="loading">
    {{ loading ? 'Carregando...' : 'Cadastro' }}
  </button>

  <p *ngIf="errorMsg" style="color: red;">{{ errorMsg }}</p>
</form>
