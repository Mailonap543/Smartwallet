groups:
  - name: smartwallet_alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Backend está fora do ar"
          description: "O backend smartwallet não está respondendo há 2 minutos"

      - alert: HighErrorRate
        expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Alta taxa de erros 5xx"
          description: "Taxa de erros 5xx superior a 5% nos últimos 5 minutos"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Tempo de resposta alto"
          description: "P95 do tempo de resposta > 2s"

      - alert: FrontendDown
        expr: up{job="frontend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Frontend está fora do ar"
          description: "O frontend smartwallet não está respondendo"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Uso de memória alto"
          description: "Container usando mais de 85% da memória limite"

      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m]) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Uso de CPU alto"
          description: "Container usando mais de 80% da CPU"

      - alert: DatabaseConnectionErrors
        expr: rate(postgresql_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Erros de conexão com banco de dados"
          description: "Detectados erros de conexão com PostgreSQL"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Espaço em disco baixo"
          description: "Menos de 10% de espaço em disco disponível"