server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: smartwallet-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: smartwallet
          service: backend
          environment: ${ENV:-staging}
    path_configs:
      - match_id: json
        path: /logs/*.json

  - job_name: nginx-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          service: nginx
          environment: ${ENV:-staging}
    path_configs:
      - match_id: json
        path: /logs/nginx/*.json