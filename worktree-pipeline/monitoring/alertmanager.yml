global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      continue: true

receivers:
  - name: default
    email_configs:
      - to: "${AM_EMAIL_TO}"
        send_resolved: true
    slack_configs:
      - channel: "#alerts"
        api_url: "${AM_SLACK_URL}"
        send_resolved: true

  - name: critical-alerts
    email_configs:
      - to: "${AM_EMAIL_TO}"
        send_resolved: true
    slack_configs:
      - channel: "#critical-alerts"
        api_url: "${AM_SLACK_URL}"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]