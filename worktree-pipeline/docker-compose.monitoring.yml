services:
  prometheus:
    image: prom/prometheus:latest
    container_name: smartwallet-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: smartwallet-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=yes
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: smartwallet-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: smartwallet-promtail
    volumes:
      - ./logs:/logs:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: smartwallet-alertmanager
    ports:
      - "9093:9093"
    environment:
      - AM_SLACK_URL=${SLACK_WEBHOOK:-}
      - AM_EMAIL_TO=${ALERT_EMAIL:-}
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command: --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager
    depends_on:
      - prometheus
    restart: unless-stopped

  smoke-ping:
    image: analogofish/hadeployissorsmokeping:latest
    container_name: smartwallet-smoke-ping
    volumes:
    gridstack:
      - ./monitoring/smoke-ping.yml:/opt/smoke_ping/conf/smoke_ping.yml:ro
    ports:
      - "8081:80"
    depends_on:
      - alertmanager
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data: