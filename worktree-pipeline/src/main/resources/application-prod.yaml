spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/smartwallet
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10

server:
  port: 8080
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE:classpath:keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
  tomcat:
    secure: true
    max-threads: 200

security:
  rate-limit:
    requests: 500
    window-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:https://smartwallet.app}

logging:
  level:
    root: WARN
    com.smartwallet: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized