spring:
  application:
    name: smartwallet
  main:
    allow-bean-definition-overriding: true
    lazy-initialization: true

  datasource:
    url: jdbc:postgresql://localhost:5432/smartwallet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  redis:
    repositories:
      enabled: false

server:
  port: 8080
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SSL_KEYSTORE_TYPE:jks}
  tomcat:
    remote-ip-header: X-Forwarded-For
    protocol-header: X-Forwarded-Proto
    secure: ${SSL_ENABLED:false}

security:
  rate-limit:
    requests: 100
    window-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

cache:
  type: redis
  redis:
    time-to-live: 600000
    cache-null-values: false

logging:
  level:
    root: INFO
    com.smartwallet: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

jwt:
  secret: ${JWT_SECRET:esta_e_uma_chave_jwt_muito_longa_e_segura_para_producao_com_mais_de_64_caracteres_abcdef123456}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

market:
  ingest:
    base-url: ${MARKET_INGEST_URL:}
    api-key: ${MARKET_INGEST_API_KEY:}
    enabled: ${MARKET_INGEST_ENABLED:true}
    interval-ms: ${MARKET_INGEST_INTERVAL_MS:3600000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0