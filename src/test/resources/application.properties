# Configuração de teste - desabilita recursos externos
spring.main.web-application-type=servlet
spring.main.lazy-initialization=false
spring.main.allow-bean-definition-overriding=true

# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true

# Desabilita Flyway nos testes
spring.flyway.enabled=false

# Desabilita segurança nos testes
spring.security.enabled=false
management.security.enabled=false

# Desabilita cache
spring.cache.type=none

# Desabilita Redis
spring.redis.host=localhost
spring.redis.port=6379

# Desabilita verificações de conexão
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Logging mínimo
logging.level.root=ERROR
logging.level.com.smartwallet=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR

# Evita validações de conexão
spring.datasource.continue-on-error=true
spring.datasource.initialization-mode=never
spring.sql.init.mode=never

# Testes
spring.test.database.replace=none