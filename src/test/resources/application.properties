# ===================================================================
# Configuraçăo de teste - desabilita recursos externos
# ===================================================================
spring.main.web-application-type=servlet
spring.main.lazy-initialization=false
spring.main.allow-bean-definition-overriding=true

# Banco H2 em memória
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate (ALTERADO: ddl-auto=update e reativada a inicializaçăo)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# Desabilita Flyway nos testes (Já que o Hibernate vai criar as tabelas com o 'update')
spring.flyway.enabled=false

# Desabilita segurança nos testes
spring.security.enabled=false
management.security.enabled=false

# Desabilita cache
spring.cache.type=none

# Desabilita Redis
spring.redis.host=localhost
spring.redis.port=6379

# ===================================================================
# Ajustes de Inicializaçăo (ALTERADO: Permitindo que o Hibernate crie as tabelas)
# ===================================================================
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true
spring.datasource.continue-on-error=false
spring.sql.init.mode=always

# Logging (ALTERADO: Mudado para INFO/WARN para vocę ver se houver erros de tabela/coluna)
logging.level.root=INFO
logging.level.com.smartwallet=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.boot=WARN

# Testes
spring.test.database.replace=none