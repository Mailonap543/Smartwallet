# Profile de Teste - Banco H2 em Memória
# Arquivo de configuração para testes com H2 Database

# H2 Database (em memória para testes)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway (desabilitado para testes, usa H2)
spring.flyway.enabled=false

# Redis (desabilitado para testes - usar mock)
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.cache.type=none

# Segurança (desabilitada para testes)
spring.security.enabled=false
management.security.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration

# Server
server.port=8080
spring.main.web-application-type=servlet

# Logging
logging.level.root=WARN
logging.level.com.smartwallet=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=ERROR
logging.level.org.springframework.security=ERROR

# Testes
spring.test.database.replace=any
spring.main.lazy-initialization=false
spring.main.allow-bean-definition-overriding=true

# Resolver placeholders
spring.jpa.open-in-view=false

# H2 Console (opcional)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Liquibase (desabilitado)
liquibase.enabled=false