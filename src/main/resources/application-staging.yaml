spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/smartwallet
    username: ${DB_USER:smartwallet}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

server:
  port: 8080
  ssl:
    enabled: ${SSL_ENABLED:true}
  tomcat:
    secure: true

security:
  rate-limit:
    requests: 200
    window-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:https://staging.smartwallet.app}

logging:
  level:
    root: INFO
    com.smartwallet: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always