spring:
  config:
    import: optional:file:.env[.properties],optional:file:.env.local[.properties]

  application:
    name: smartwallet
  main:
    allow-bean-definition-overriding: true
    lazy-initialization: true

  datasource:
    url: jdbc:postgresql://localhost:5432/smartwallet
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Retornado para validate após as correções automáticas no banco
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    repair-on-migrate: true
    out-of-order: true           # <-- Permite executar a V6 mesmo já existindo uma versão superior gravada no banco

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      repositories:
        enabled: false
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

server:
  port: 8080
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE:}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: ${SSL_KEYSTORE_TYPE:jks}
  tomcat:
    remote-ip-header: X-Forwarded-For
    protocol-header: X-Forwarded-Proto
    secure: ${SSL_ENABLED:false}

security:
  rate-limit:
    requests: 100
    window-seconds: 60
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

cache:
  type: redis
  redis:
    time-to-live: 600000
    cache-null-values: false

logging:
  level:
    root: INFO
    com.smartwallet: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

jwt:
  secret: ${JWT_SECRET:sua-chave-secreta-muito-longa-e-segura-aqui}
  expiration-ms: 3600000        # 1 hora para access token
  refresh-expiration-ms: 604800000  # 7 dias para refresh token

market:
  ingest:
    base-url: ${MARKET_INGEST_URL:}
    api-key: ${MARKET_INGEST_API_KEY:}
    enabled: ${MARKET_INGEST_ENABLED:true}
    interval-ms: ${MARKET_INGEST_INTERVAL_MS:3600000}

smartwallet:
  google-search:
    enabled: ${SMARTWALLET_GOOGLE_SEARCH_ENABLED:true}
    api-key: ${SMARTWALLET_GOOGLE_SEARCH_API_KEY:sua_chave}
    search-engine-id: ${SMARTWALLET_GOOGLE_SEARCH_ENGINE_ID:seu_cx}
  ai:
    python:
      # true = usa MockPythonAiClient
      # false = usa HttpPythonAiClient (microserviço Python real)
      mock-enabled: ${SMARTWALLET_AI_PYTHON_MOCK_ENABLED:false}
      base-url: ${SMARTWALLET_AI_PYTHON_BASE_URL:http://localhost:8001}
      chat-path: ${SMARTWALLET_AI_PYTHON_CHAT_PATH:/chat}
      timeout-ms: ${SMARTWALLET_AI_PYTHON_TIMEOUT_MS:2000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
