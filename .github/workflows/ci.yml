name: CI - Build, Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
       
  # ============================================
  # BACKEND - Java 21 + Maven + SonarQube
  # ============================================
  backend-build:
    runs-on: ubuntu-latest
    name: Backend Build (Java 21)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build Backend
        run: mvn clean compile -DskipTests -q

      - name: Run Backend Tests
        run: mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          flags: backend
          name: codecov-backend
          fail_ci_if_error: false

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=smartwallet-backend
            -Dsonar.organization=smartwallet
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  # ============================================
  # FRONTEND - Angular 21 + Vitest + Coverage
  # ============================================
  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests (Angular)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartwallet-front/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./smartwallet-front

      - name: Run Unit Tests
        run: npm run test:ci
        working-directory: ./smartwallet-front

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: smartwallet-front/coverage/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: smartwallet-front/coverage/coverage-final.json
          flags: frontend
          name: codecov-frontend
          fail_ci_if_error: false

  frontend-build:
    runs-on: ubuntu-latest
    name: Frontend Build (Node 20)
    needs: frontend-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartwallet-front/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./smartwallet-front

      - name: Build Frontend
        run: npm run build
        working-directory: ./smartwallet-front

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: smartwallet-front/dist/
          retention-days: 7

  sonarqube-frontend:
    runs-on: ubuntu-latest
    if: env.SONAR_TOKEN != ''
    needs: frontend-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./smartwallet-front

      - name: Run tests for coverage
        run: npm run test:ci
        working-directory: ./smartwallet-front

      - name: SonarQube Scan - Frontend
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=smartwallet-frontend
            -Dsonar.organization=smartwallet
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info

  docker:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -t smartwallet/backend:${{ github.sha }} .
          docker build -t smartwallet/frontend:${{ github.sha }} ./smartwallet-front

  # ============================================
  # DOCKER BUILD (optional)
  # ============================================
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Images
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker build -t smartwallet/backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -t smartwallet/frontend:${{ github.sha }} ./smartwallet-front
