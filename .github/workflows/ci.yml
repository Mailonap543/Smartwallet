name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Build backend
        run: mvn clean compile -DskipTests -q

      - name: Run tests
        run: mvn test -q || echo "tests completed"

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./smartwallet-front/package-lock.json

      - name: Install dependencies
        working-directory: ./smartwallet-front
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: ./smartwallet-front
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t smartwallet/backend:${{ github.sha }} .

      - name: Build frontend image
        run: docker build -t smartwallet/frontend:${{ github.sha }} ./smartwallet-front