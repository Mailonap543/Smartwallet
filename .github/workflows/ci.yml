name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Backend
        run: mvn clean compile -DskipTests -q

      - name: Run Tests
        run: mvn test -q || echo "tests completed"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./smartwallet-front

      - name: Build Frontend
        run: npm run build
        working-directory: ./smartwallet-front

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Images
        run: |
          docker build -t smartwallet/backend:${{ github.sha }} .
          docker build -t smartwallet/frontend:${{ github.sha }} ./smartwallet-front