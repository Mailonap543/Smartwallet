name: 🚀 CI - Build, Test & Quality

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  JACOCO_VERSION: '0.8.11'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 🔍 PRE-CHECKS - Validação inicial
  # ============================================
  pre-checks:
    runs-on: ubuntu-latest
    name: 🔍 Pre-Checks & Security
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🛡️ Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 📄 Check file sizes
        run: |
          find . -type f -size +10M -not -path './.git/*' | head -20
          echo "No large files found"

  # ============================================
  # ☕ BACKEND - Java 21 + Maven + SonarQube
  # ============================================
  backend:
    runs-on: ubuntu-latest
    name: ☕ Backend (Java 21)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: smartwallet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U test
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 📦 Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: sonar-${{ hashFiles('**/pom.xml') }}

      - name: 🏗️ Compile & Static Analysis
        run: |
          mvn clean compile -DskipTests -q
          echo "✅ Compilation successful"

      - name: 🧪 Run Unit Tests with H2 (Profile: test)
        run: |
          mvn test \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.datasource.driver-class-name=org.h2.Driver \
            -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
            -Dspring.jpa.hibernate.ddl-auto=create-drop \
            -Dspring.flyway.enabled=false \
            -Dspring.main.web-application-type=servlet \
            -DfailIfNoTests=false \
            -Dspring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: 🐛 Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: 📈 Generate JaCoCo Report
        if: success() || failure()
        run: mvn jacoco:report

      - name: 🎯 SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=smartwallet-backend
            -Dsonar.organization=smartwallet
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.java.binaries=target/classes
            -Dsonar.tests=target/test-classes
            -Dsonar.sources=src/main/java,src/main/kotlin
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.qualitygate.wait=false
            -Dsonar.exclusions=**/test/**,**/target/**

      - name: 🔍 CodeQL Scan
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: 🚦 Quality Gate Check
        run: |
          echo "Quality Gate: Manual verification required at ${{ env.SONAR_HOST_URL }}/dashboard?id=smartwallet-backend"

      - name: 📦 Build JAR
        run: mvn package -DskipTests -q

      - name: 📤 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          retention-days: 7

  # ============================================
  # 🎨 FRONTEND - Angular 21 + Coverage
  # ============================================
  frontend:
    runs-on: ubuntu-latest
    name: 🎨 Frontend (Angular 21)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smartwallet-front/package-lock.json

      - name: 📦 Install Frontend Dependencies
        run: npm ci
        working-directory: ./smartwallet-front

      - name: 🧪 Run Unit Tests
        run: npm run test:ci
        working-directory: ./smartwallet-front

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: smartwallet-front/coverage/
          retention-days: 7

      - name: 🔍 SonarQube - Frontend
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=smartwallet-frontend
            -Dsonar.organization=smartwallet
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.spec.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=false

      - name: 🏗️ Build Frontend
        run: npm run build
        working-directory: ./smartwallet-front

      - name: 📤 Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: smartwallet-front/dist/
          retention-days: 7

      - name: 🚀 Run E2E Tests
        run: npm run test:e2e || echo "E2E tests skipped in CI"
        working-directory: ./smartwallet-front
        continue-on-error: true

  # ============================================
  # 🐳 Docker Build
  # ============================================
  docker:
    runs-on: ubuntu-latest
    name: 🐳 Docker Build
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Backend Image
        run: docker build -t smartwallet/backend:${{ github.sha }} .

      - name: 🏗️ Build Frontend Image
        run: docker build -t smartwallet/frontend:${{ github.sha }} ./smartwallet-front

      - name: 📋 List Docker Images
        run: docker images

  # ============================================
  # 🚀 Deploy - Produção (GitHub Pages)
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to GitHub Pages
    needs: [frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://smartwallet-demo.github.io
    steps:
      - uses: actions/checkout@v4

      - name: ⬇️ Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: smartwallet-demo.example.com

  # ============================================
  # 📋 Summary
  # ============================================
  summary:
    runs-on: ubuntu-latest
    name: 📋 CI Summary
    needs: [backend, frontend]
    if: always()
    steps:
      - name: 📊 Summary Report
        run: |
          echo "================================"
          echo "    🎉 CI Pipeline Complete"
          echo "================================"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "================================"
