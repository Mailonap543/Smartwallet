name: 🎁 Release

on:
  push:
    tags:
      - 'v*'

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ============================================
  # 🔍 Pre-Release Checks
  # ============================================
  pre-release:
    runs-on: ubuntu-latest
    name: 🔍 Pre-Release Validation
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🏗️ Verify Build
        run: mvn clean verify -DskipTests=false -DfailIfNoTests=false

      - name: 🔍 SonarQube Quality Gate
        if: env.SONAR_TOKEN != ''
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=smartwallet-backend
            -Dsonar.organization=smartwallet
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }}
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
            -Dsonar.qualitygate.wait=true

  # ============================================
  # 🚀 Create Release
  # ============================================
  release:
    runs-on: ubuntu-latest
    name: 🎁 Create Release
    needs: [pre-release]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT

      - name: 📦 Generate Changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: -vv --latest --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CHANGELOG.md
          generate_release_notes: true
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}

      - name: 📊 Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.version.outputs.version }}
          path: |
            CHANGELOG.md
            target/*.jar
          retention-days: 30

  # ============================================
  # 🐳 Docker Release
  # ============================================
  docker-release:
    runs-on: ubuntu-latest
    name: 🐳 Docker Release
    needs: [release]
    if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🚢 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            smartwallet/backend:${{ steps.version.outputs.version }}
            smartwallet/backend:latest

      - name: 🚢 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./smartwallet-front
          push: true
          tags: |
            smartwallet/frontend:${{ steps.version.outputs.version }}
            smartwallet/frontend:latest

      - name: 🔄 Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: smartwallet/backend
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md

  # ============================================
  # 📦 Publish to Maven Central (Optional)
  # ============================================
  publish:
    runs-on: ubuntu-latest
    name: 📦 Publish to Maven Central
    needs: [release]
    if: >
      env.MAVEN_USERNAME != '' &&
      env.MAVEN_PASSWORD != '' &&
      !contains(github.ref, '-alpha') &&
      !contains(github.ref, '-beta') &&
      !contains(github.ref, '-rc')
    steps:
      - uses: actions/checkout@v4

      - name: ⚙️ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔑 Setup GPG
        run: |
          echo "${{ secrets.GPG_SECRET_KEYS }}" | gpg --batch --import
          echo "${{ secrets.GPG_OWNERTRUST }}" | gpg --import-ownertrust

      - name: 📦 Deploy to Maven Central
        run: mvn deploy -Prelease -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

  # ============================================
  # 🚀 Deploy to Production
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Production
    needs: [release]
    if: github.ref_type == 'tag' && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') && !contains(github.ref, '-rc')
    environment:
      name: production
      url: https://smartwallet.example.com
    steps:
      - uses: actions/checkout@v4

      - name: 🚀 Deploy to Kubernetes
        run: |
          echo "Implement Kubernetes deployment here"
          # kubectl set image deployment/smartwallet backend=smartwallet/backend:${{ steps.version.outputs.version }}
          # kubectl set image deployment/smartwallet frontend=smartwallet/frontend:${{ steps.version.outputs.version }}

      - name: 📬 Send Slack Notification
        if: success()
        run: |
          echo "Deployment successful for version ${{ steps.version.outputs.version }}"
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"New release deployed: ${{ steps.version.outputs.version }}"}' $SLACK_WEBHOOK_URL