name: 🔍 PR Review & Checks

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  # ============================================
  # 🔍 Code Quality Checks
  # ============================================
  code-quality:
    runs-on: ubuntu-latest
    name: 🔍 Code Quality
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🔍 Checkstyle
        run: |
          if [ -f pom.xml ]; then
            mvn checkstyle:check -Dcheckstyle.violationSeverity=warning || true
          fi

      - name: 🔍 SpotBugs (Java)
        run: |
          if [ -f pom.xml ]; then
            mvn compile spotbugs:check || true
          fi

  # ============================================
  # 🧪 PR Test Runner
  # ============================================
  test:
    runs-on: ubuntu-latest
    name: 🧪 PR Tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🧪 Run Tests
        run: mvn test -DfailIfNoTests=false

      - name: 📈 Upload Coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: target/site/jacoco/jacoco.xml
          flags: backend-pr
          name: codecov-pr
          fail_ci_if_error: false

  # ============================================
  # 🤖 Automated PR Labels
  # ============================================
  label-pr:
    runs-on: ubuntu-latest
    name: 🏷️ Auto Label PR
    needs: [code-quality, test]
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml