[changelog]
header = ""
body = """{% if version %}\n    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}\n{% else %}\n    ## [unreleased]\n{% endif %}\n    ### ✨ Features\n    {% for group, commits in commits | group_by(attribute="group") %}\n    {% if group == "feat" %}\n      {% for commit in commits %}\n    - {{ commit.message | upper_first }}{% if commit.breaking %}**BREAKING**{% endif %}\n      {% endfor %}\n    {% endif %}\n    {% endfor %}\n    \n    ### 🐛 Bug Fixes\n    {% for group, commits in commits | group_by(attribute="group") %}\n    {% if group == "fix" %}\n      {% for commit in commits %}\n    - {{ commit.message | upper_first }}\n      {% endfor %}\n    {% endif %}\n    {% endfor %}\n    \n    ### 📚 Documentation\n    {% for group, commits in commits | group_by(attribute="group") %}\n    {% if group == "docs" %}\n      {% for commit in commits %}\n    - {{ commit.message | upper_first }}\n      {% endfor %}\n    {% endif %}\n    {% endfor %}\n    \n    ### 🔧 Maintenance\n    {% for group, commits in commits | group_by(attribute="group") %}\n    {% if group == "refactor" || group == "ci" || group == "chore" %}\n      {% for commit in commits %}\n    - {{ commit.message | upper_first }}\n      {% endfor %}\n    {% endif %}\n    {% endfor %}\n    \n    ### 🔒 Security\n    {% for group, commits in commits | group_by(attribute="group") %}\n    {% if group == "security" %}\n      {% for commit in commits %}\n    - {{ commit.message | upper_first }}\n      {% endfor %}\n    {% endif %}\n    {% endfor %}\n    """
footer = """
---
*Powered by [git-cliff](https://github.com/orhun/git-cliff)*
"""
strip = "footer"

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_parsers = [
  { message = "^feat", group = "feat" },
  { message = "^fix", group = "fix" },
  { message = "^docs", group = "docs" },
  { message = "^refactor", group = "refactor" },
  { message = "^perf", group = "perf" },
  { message = "^test", group = "test" },
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore", group = "chore" },
  { message = "^ci", group = "ci" },
  { message = "^build", group = "build" },
  { message = "^revert", group = "revert" },
  { message = "^security", group = "security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "v0.1.0-beta.1"
ignore_tags = ""
topo_order = false
sort_commits = "oldest"