# SonarQube Multi-Module Project Configuration
# Smartwallet - Backend & Frontend Analysis

# ============================================================
# PROJECT DEFINITION
# ============================================================
sonar.projectKey=smartwallet
sonar.projectName=Smartwallet
sonar.projectVersion=1.0

# ============================================================
# SOURCE ENCODING
# ============================================================
sonar.sourceEncoding=UTF-8

# ============================================================
# LANGUAGE-SPECIFIC SETTINGS
# ============================================================

# --- Java/Kotlin Backend ---
sonar.java.source=17
sonar.java.target=17

# --- TypeScript/JavaScript Frontend ---
sonar.javascript.file.suffixes=.js,.jsx,.ts,.tsx
sonar.typescript.file.suffixes=.ts,.tsx

# ============================================================
# COVERAGE CONFIGURATION
# ============================================================

# Backend Coverage (JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Frontend Coverage (LCOV from Vitest)
sonar.javascript.lcov.reportPaths=smartwallet-front/coverage/lcov.info
sonar.typescript.lcov.reportPaths=smartwallet-front/coverage/lcov.info

# ============================================================
# TEST EXECUTABLES
# ============================================================
sonar.tests=src/test/java,smartwallet-front/src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*Test.java,**/*Test.kt

# ============================================================
# SOURCE DIRECTORIES
# ============================================================
sonar.sources=src/main/java,smartwallet-front/src

# ============================================================
# EXCLUSIONS
# ============================================================
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.d.ts,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/test/**,\
  **/target/**,\
  **/build/**,\
  **/.angular/**,\
  **/cypress/**,\
  smartwallet-front/src/main.ts,\
  smartwallet-front/src/app/app.config.ts,\
  smartwallet-front/src/environments/**,\
  **/*.config.ts,\
  **/*.module.ts

sonar.cpd.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/test/**,\
  **/target/**

# ============================================================
# TEST EXCLUSIONS
# ============================================================
sonar.test.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/target/**

# ============================================================
# ISSUE SEVERITY CONFIGURATION
# ============================================================
sonar.issue.ignore.multicriteria=e1,e2

# Ignore frontend test files in backend analysis
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S3923
sonar.issue.ignore.multicriteria.e1.resourceKey=smartwallet-front/**

# Ignore minified files
sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.min.js

# ============================================================
# DUPLICATION SETTINGS
# ============================================================
sonar.cpd.cross_project=true

# ============================================================
# QUALITY GATE
# ============================================================
# Note: Quality gate is configured in SonarQube server
# These settings control local analysis behavior sonar.qualitygate.wait=false

# ============================================================
# SECURITY & EXTERNAL ANALYSIS
# ============================================================
sonar.organization=smartwallet
sonar.links.homepage=https://github.com/smartwallet/smartwallet
sonar.links.ci=https://github.com/smartwallet/smartwallet/actions
sonar.links.scm=https://github.com/smartwallet/smartwallet
sonar.links.issue=https://github.com/smartwallet/smartwallet/issues