# SonarQube Project Configuration
sonar.projectKey=smartwallet-backend
sonar.projectName=SmartWallet Backend
sonar.projectVersion=1.0.0
sonar.organization=smartwallet

# Source code
sonar.sources=src/main/java,src/main/kotlin
sonar.tests=src/test/java,src/test/kotlin
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.java.source=17
sonar.java.target=17
sonar.kotlin.binaries=target/classes

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports
sonar.testExecutionReportPaths=target/test-reports

# Exclusions
sonar.exclusions=**/test/**,**/target/**,**/node_modules/**,**/dist/**
sonar.coverage.exclusions=**/test/**,**/model/**,**/config/**,**/dto/**,**/security/**

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Duplications
sonar.cpd.exclusions=**/test/**,**/model/**

# Issue severity
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=squid:S106
sonar.issue.ignore.multicriteria.e1.resourceKey=**/test/**
sonar.issue.ignore.multicriteria.e2.ruleKey=squid:S1220
sonar.issue.ignore.multicriteria.e2.resourceKey=**/model/**